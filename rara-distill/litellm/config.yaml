# LiteLLM gateway config (rara 2.0) — OpenAI-compatible proxy.
# API keys come from Cloud Run secrets at runtime — never from this file.
#
# CUTOVER DONE (CONSOLE-INFER-#7): the authoritative LLM catalog now lives in Neon
# (llm_providers / llm_models) and is reconciled into this gateway at runtime
# (store_model_in_db). model_list is intentionally empty — models are managed in the
# Console (/inferencia), not here. Runbook: docs/INFERENCIA-CUTOVER.md.

model_list: []

general_settings:
  # Master key: clients send this as bearer token via LITELLM_API_KEY.
  master_key: os.environ/LITELLM_MASTER_KEY
  # DB-mode: Admin API + reconciler-managed models. LITELLM_SALT_KEY encrypts stored creds — set once, never rotate.
  store_model_in_db: true
  database_url: os.environ/DATABASE_URL
