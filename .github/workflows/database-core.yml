name: Database rara-core

on:
  push:
    branches:
      - main
    paths:
      - 'rara-core/migrations/**'
      - '.github/workflows/database-core.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'rara-core/migrations/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - migrate

jobs:
  validate:
    name: Validate Schema
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Build DATABASE_URL from secrets
        env:
          NEON_USERNAME: ${{ secrets.NEON_USERNAME }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_PORT: ${{ secrets.NEON_PORT }}
          NEON_DATABASE: ${{ secrets.NEON_DATABASE }}
        run: |
          echo "DATABASE_URL=postgresql://${NEON_USERNAME}:${NEON_PASSWORD}@${NEON_HOST}:${NEON_PORT}/${NEON_DATABASE}" >> "$GITHUB_ENV"

      - name: Test database connection
        run: |
          echo "Testing connection to Neon..."
          psql "$DATABASE_URL" -c "SELECT version();" || exit 1
          echo "✅ Database connection successful"

      - name: Check migration files
        run: |
          if [ ! -d "rara-core/migrations" ]; then
            echo "❌ migrations directory not found"
            exit 1
          fi
          MIGRATION_COUNT=$(ls -1 rara-core/migrations/*.sql 2>/dev/null | wc -l)
          echo "Found $MIGRATION_COUNT migration files"
          if [ "$MIGRATION_COUNT" -eq 0 ]; then
            echo "❌ No migration files found"
            exit 1
          fi

      - name: Validate SQL syntax
        run: |
          # Execute each migration inside a transaction and roll it back, so the
          # SQL is genuinely parsed/planned by Postgres without persisting changes.
          for file in rara-core/migrations/*.sql; do
            echo "Validating: $(basename "$file")"
            { echo "BEGIN;"; cat "$file"; echo "ROLLBACK;"; } \
              | psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q \
              && echo "✅ $(basename "$file") is valid" \
              || { echo "❌ $(basename "$file") failed validation"; exit 1; }
          done

  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    # Auto-apply on merge to main, or on a manual "migrate" dispatch.
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'migrate')
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Build DATABASE_URL from secrets
        env:
          NEON_USERNAME: ${{ secrets.NEON_USERNAME }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_PORT: ${{ secrets.NEON_PORT }}
          NEON_DATABASE: ${{ secrets.NEON_DATABASE }}
        run: |
          echo "DATABASE_URL=postgresql://${NEON_USERNAME}:${NEON_PASSWORD}@${NEON_HOST}:${NEON_PORT}/${NEON_DATABASE}" >> "$GITHUB_ENV"

      - name: Apply migrations
        run: |
          echo "Applying migrations..."
          for migration in rara-core/migrations/*.sql; do
            if [ -f "$migration" ]; then
              echo "Running: $(basename $migration)..."
              psql "$DATABASE_URL" -f "$migration" || exit 1
              echo "✅ $(basename $migration) applied successfully"
            fi
          done

      - name: Verify schema
        run: |
          echo "Verifying schema..."
          MISSING=0
          for tbl in capabilities providers flows flow_steps routing_policies items item_steps gate_decisions gate_rules feedback interest_profile; do
            COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_name = '$tbl'")
            if [ "$(echo "$COUNT" | tr -d '[:space:]')" -eq 1 ]; then
              echo "  ✅ $tbl"
            else
              echo "  ❌ $tbl missing"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "❌ Schema verification failed"
            exit 1
          fi
          echo "✅ Schema verified successfully"

      - name: Check indexes
        run: |
          echo "Verifying claim index for the pull/SKIP LOCKED work queue..."
          psql "$DATABASE_URL" -c "\d item_steps" | grep -q "idx_item_steps_claim" \
            && echo "✅ idx_item_steps_claim present" \
            || { echo "❌ idx_item_steps_claim missing"; exit 1; }
