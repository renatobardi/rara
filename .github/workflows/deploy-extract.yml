name: Deploy rara-extract

# GATED — manual dispatch only (NO push:main). rara-extract is a 2.0 claim-worker (the
# already-text extractor): it only runs once the reconciler routes an `extrair` item_step to
# its provider.
#
# ONE image, THREE workers (glean=news, winnow=email, scrub=linkedin) → ONE consolidated Cloud Run
# Job (`rara-extract`). The dispatcher sets GLEAN_PROVIDER per execution override — one job serves
# all three workers. (The legacy per-worker GCP jobs remain untouched until P2b-extract-B flips providers.app.)
#
# Multi-arch image: amd64 (Cloud Run) + arm64 (VPC Oracle Ampere + Mac Apple Silicon). The image
# is built once (the `build` job) then the `deploy` job creates/updates the consolidated job.
# See DOCKER-MULTIMODULE.md and CONSOLE-WORKERS-PLANO-E5b.pt-BR.md §4/P2b.
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: false
        type: boolean

# Only one deployment can run at a time — concurrent workflow_dispatch triggers could race on the
# same Cloud Run Job resource and leave state inconsistent.
concurrency:
  group: deploy-extract
  cancel-in-progress: false

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-extract:${{ github.sha }}

jobs:
  build:
    if: github.ref_name == github.event.repository.default_branch
    name: Build multi-arch image (amd64 + arm64)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      # buildx forwards the gcloud credential helper's token over the build session, so no separate
      # docker login action is needed.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      # QEMU only emulates the tiny final alpine stage; the Go compile cross-builds natively.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      # MULTI-MODULE context = repo root so `replace rara-addon => ../rara-addon` resolves; the
      # Dockerfile lives in the app dir and is selected with `file:`. See DOCKER-MULTIMODULE.md.
      - name: Build and push manifest list
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: rara-extract/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}

      # Acceptance check: the manifest list MUST carry exactly linux/amd64 + linux/arm64.
      # build-push-action v6 also emits attestation entries (platform: unknown/unknown); filter
      # those out before counting so the check stays exact without disabling provenance.
      - name: Verify manifest list has both arches
        run: |
          docker buildx imagetools inspect "$IMAGE"
          PLATFORMS=$(docker buildx imagetools inspect "$IMAGE" \
            --format '{{range .Manifest.Manifests}}{{if ne .Platform.OS "unknown"}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}{{end}}')
          echo "Platforms in manifest list: $PLATFORMS"
          echo "$PLATFORMS" | grep -qw "linux/amd64" || { echo "❌ missing linux/amd64"; exit 1; }
          echo "$PLATFORMS" | grep -qw "linux/arm64" || { echo "❌ missing linux/arm64"; exit 1; }
          COUNT=$(echo "$PLATFORMS" | wc -w)
          [ "$COUNT" -eq 2 ] || { echo "❌ expected exactly 2 real platforms, found $COUNT: $PLATFORMS"; exit 1; }
          echo "✅ manifest list has exactly linux/amd64 + linux/arm64"

  deploy:
    if: github.ref_name == github.event.repository.default_branch
    name: Deploy consolidated Cloud Run Job (rara-extract)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ vars.GCP_REGION }}
      JOB_NAME: rara-extract
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Deploy Cloud Run Job
        run: |
          # Consolidated job: GLEAN_PROVIDER is injected per execution via dispatcher overrides
          # (not baked in at deploy time). Default placeholder is set here so the job definition
          # is valid; the dispatcher always overrides it on each run.
          #
          # GLEAN_PROVIDER=PLACEHOLDER_PROVIDER is intentionally invalid: the dispatcher ALWAYS
          # overrides it per execution. If the job runs without a dispatcher override (e.g. via
          # run_after_deploy=true or a manual gcloud execute) it will fail fast on unrecognised
          # provider — correct behaviour; silent wrong-queue processing would be worse.
          SECRETS="DATABASE_URL=database-url:latest"
          ENV_VARS="GLEAN_PROVIDER=PLACEHOLDER_PROVIDER"
          COMMON_ARGS=(
            --image "$IMAGE"
            --region "$REGION"
            --project "$GCP_PROJECT"
            --set-secrets "$SECRETS"
            --set-env-vars "$ENV_VARS"
            --max-retries 0
            --task-timeout 3600s
            --memory 512Mi
            --cpu 1
          )

          STDERR_FILE=$(mktemp)
          gcloud run jobs update "$JOB_NAME" "${COMMON_ARGS[@]}" 2>"$STDERR_FILE" && rm -f "$STDERR_FILE" || {
            STDERR=$(cat "$STDERR_FILE"); rm -f "$STDERR_FILE"
            echo "$STDERR"
            echo "$STDERR" | grep -qiE "not found|does not exist|could not be found|cannot be found" || \
              { echo "❌ update failed for unexpected reason (not 'not found')"; exit 1; }
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" "${COMMON_ARGS[@]}"
          }

      - name: Execute job once
        if: ${{ inputs.run_after_deploy }}
        run: |
          echo "⚠️ Running with GLEAN_PROVIDER=PLACEHOLDER_PROVIDER — dispatcher must override via env."
          echo "This execution will FAIL unless a dispatcher override is provided."
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "$GCP_PROJECT" \
            --wait
