name: Deploy rara-clip

# MULTI-ARCH: builds ONE image with `docker buildx` (amd64 for Cloud Run + arm64 for VPC/Mac)
# and pushes a manifest list to Artifact Registry. Cloud Run pulls the amd64 leaf automatically.
# Context = rara-clip (single-module, no SDK dependency). See DOCKER-MULTIMODULE.md.
# Note: the final alpine stage installs nodejs/npm (@brightdata/cli) — this runs under QEMU for
# arm64 but is cheap; only the Go compile cross-builds natively.
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - main
    paths:
      - 'rara-clip/**'
      - '.github/workflows/deploy-clip.yml'

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-clip:${{ github.sha }}

jobs:
  build:
    name: Build multi-arch image (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Build and push manifest list
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: rara-clip
          file: rara-clip/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # :<sha> — imutável, usado pelo Cloud Run. :latest — mutável, puxado pelo agent VPC/Mac
          # via `docker run --pull=always` (intencional; ver #198).
          tags: |
            ${{ env.IMAGE }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-clip:latest

      - name: Verify manifest list has both arches
        run: |
          docker buildx imagetools inspect "$IMAGE"
          PLATFORMS=$(docker buildx imagetools inspect "$IMAGE" \
            --format '{{range .Manifest.Manifests}}{{if ne .Platform.OS "unknown"}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}{{end}}')
          echo "Platforms in manifest list: $PLATFORMS"
          echo "$PLATFORMS" | grep -qw "linux/amd64" || { echo "❌ missing linux/amd64"; exit 1; }
          echo "$PLATFORMS" | grep -qw "linux/arm64" || { echo "❌ missing linux/arm64"; exit 1; }
          COUNT=$(echo "$PLATFORMS" | wc -w)
          [ "$COUNT" -eq 2 ] || { echo "❌ expected exactly 2 real platforms, found $COUNT: $PLATFORMS"; exit 1; }
          echo "✅ manifest list has exactly linux/amd64 + linux/arm64"

  deploy:
    name: Deploy Cloud Run Job
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ vars.GCP_REGION }}
      JOB_NAME: rara-clip
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Deploy Cloud Run Job
        run: |
          # ^|^ changes gcloud's env-var delimiter from comma to pipe so that
          # BRIGHTDATA_LINKEDIN_URLS can itself contain commas (multiple profile URLs).
          COMMON_FLAGS=(
            --image "$IMAGE"
            --region "$REGION"
            --project "$GCP_PROJECT"
            --set-secrets "DATABASE_URL=database-url:latest,BRIGHTDATA_API_KEY=brightdata-api-key:latest"
            --set-env-vars "^|^BDATA_BIN=bdata|BRIGHTDATA_LINKEDIN_ARGS=pipelines linkedin-posts --json|BRIGHTDATA_LINKEDIN_URLS=${{ vars.BRIGHTDATA_LINKEDIN_URLS }}"
            --max-retries 0
            --task-timeout 3600s
            --memory 512Mi
            --cpu 1
          )
          if gcloud run jobs describe "$JOB_NAME" \
               --region "$REGION" \
               --project "$GCP_PROJECT" > /dev/null 2>&1; then
            gcloud run jobs update "$JOB_NAME" "${COMMON_FLAGS[@]}"
          else
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" "${COMMON_FLAGS[@]}"
          fi

      - name: Execute job once
        # Only on explicit opt-in (workflow_dispatch). Push-triggered deploys do NOT auto-run
        # the clip job: the LinkedIn collector needs BRIGHTDATA_API_KEY + BRIGHTDATA_LINKEDIN_URLS
        # configured first (ops step), so auto-running on merge would be a no-op at best.
        if: github.event.inputs.run_after_deploy == 'true'
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "$GCP_PROJECT" \
            --wait
