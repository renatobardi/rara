name: Deploy rara-clip

on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - main
    paths:
      - 'rara-clip/**'
      - '.github/workflows/deploy-clip.yml'

# Required for Workload Identity Federation (keyless auth to GCP).
permissions:
  contents: read
  id-token: write

env:
  REGION: ${{ vars.GCP_REGION }}
  JOB_NAME: rara-clip
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-clip:${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy Cloud Run Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # WIF external_account credentials are not fully compatible with all
          # gcloud operations (e.g. Cloud Build source upload to GCS). Requesting
          # an access_token exchanges the WIF token for a standard OAuth2 token
          # that works with every gcloud command and client library.
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Build image with Cloud Build
        run: |
          # gcloud builds submit's internal GCS upload fails with external_account
          # (WIF) credentials. Upload source ourselves (gcloud storage works fine),
          # then submit with --no-source referencing the pre-uploaded object.
          tar -czf /tmp/source.tgz -C rara-clip .
          # Namespace the object by job: a single merge can trigger two agent deploys
          # concurrently, and a bare source/${SHA}.tgz path makes them clobber each
          # other's source — building one agent's binary into the other's image.
          gcloud storage cp /tmp/source.tgz \
            "gs://${{ vars.GCP_PROJECT_ID }}_cloudbuild/source/${JOB_NAME}-${GITHUB_SHA}.tgz"

          cat > /tmp/cloudbuild.yaml << YAML
          steps:
          - name: 'gcr.io/cloud-builders/docker'
            args: ['build', '-t', '${IMAGE}', '.']
          source:
            storageSource:
              bucket: ${{ vars.GCP_PROJECT_ID }}_cloudbuild
              object: source/${JOB_NAME}-${GITHUB_SHA}.tgz
          images: ['${IMAGE}']
          YAML

          # --async avoids log streaming (SA lacks log viewer); we poll status instead.
          BUILD_ID=$(gcloud builds submit \
            --no-source \
            --config=/tmp/cloudbuild.yaml \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --async \
            --format='value(id)')
          echo "Cloud Build ID: $BUILD_ID"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status)')
            echo "Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "Image built successfully"; break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "Build failed: $STATUS"
                gcloud builds describe "$BUILD_ID" \
                  --project "${{ vars.GCP_PROJECT_ID }}" \
                  --format='table(steps.name,steps.status,steps.args)' 2>/dev/null || true
                exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Deploy Cloud Run Job
        run: |
          # Try to update first. If the job doesn't exist yet, create it. This avoids
          # the TOCTOU race of describe→create/update.
          # ^|^ changes gcloud's env-var delimiter from comma to pipe so that
          # BRIGHTDATA_LINKEDIN_URLS can itself contain commas (multiple profile URLs).
          COMMON_FLAGS=(
            --image "$IMAGE"
            --region "$REGION"
            --project "${{ vars.GCP_PROJECT_ID }}"
            --set-secrets "DATABASE_URL=database-url:latest,BRIGHTDATA_API_KEY=brightdata-api-key:latest"
            --set-env-vars "^|^BDATA_BIN=bdata|BRIGHTDATA_LINKEDIN_ARGS=pipelines linkedin-posts --json|BRIGHTDATA_LINKEDIN_URLS=${{ vars.BRIGHTDATA_LINKEDIN_URLS }}"
            --max-retries 0
            --task-timeout 3600s
            --memory 512Mi
            --cpu 1
          )
          if gcloud run jobs describe "$JOB_NAME" \
               --region "$REGION" \
               --project "${{ vars.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            gcloud run jobs update "$JOB_NAME" "${COMMON_FLAGS[@]}"
          else
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" "${COMMON_FLAGS[@]}"
          fi

      - name: Execute job once
        # Only on explicit opt-in (workflow_dispatch). Push-triggered deploys do NOT auto-run
        # the clip job: the LinkedIn collector needs BRIGHTDATA_API_KEY + BRIGHTDATA_LINKEDIN_URLS
        # configured first (ops step), so auto-running on merge would be a no-op at best.
        if: github.event.inputs.run_after_deploy == 'true'
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait
