name: Deploy distill to Cloud Run

on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - main
    paths:
      - 'rara-distill/**'
      - '.github/workflows/deploy-distill.yml'

# Required for Workload Identity Federation (keyless auth to GCP).
permissions:
  contents: read
  id-token: write

env:
  REGION: ${{ vars.GCP_REGION }}
  JOB_NAME: rara-distill
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-distill:${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy Cloud Run Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # WIF external_account credentials are not fully compatible with all
          # gcloud operations (e.g. Cloud Build source upload to GCS). Requesting
          # an access_token exchanges the WIF token for a standard OAuth2 token
          # that works with every gcloud command and client library.
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Build image with Cloud Build
        run: |
          # gcloud builds submit's internal GCS upload fails with external_account
          # (WIF) credentials. Upload source ourselves (gcloud storage works fine),
          # then submit with --no-source referencing the pre-uploaded object.
          tar -czf /tmp/source.tgz -C rara-distill .
          gcloud storage cp /tmp/source.tgz \
            "gs://${{ vars.GCP_PROJECT_ID }}_cloudbuild/source/${GITHUB_SHA}.tgz"

          cat > /tmp/cloudbuild.yaml << YAML
          steps:
          - name: 'gcr.io/cloud-builders/docker'
            args: ['build', '-t', '${IMAGE}', '.']
          source:
            storageSource:
              bucket: ${{ vars.GCP_PROJECT_ID }}_cloudbuild
              object: source/${GITHUB_SHA}.tgz
          images: ['${IMAGE}']
          YAML

          # --async avoids log streaming (SA lacks log viewer); we poll status instead.
          BUILD_ID=$(gcloud builds submit \
            --no-source \
            --config=/tmp/cloudbuild.yaml \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --async \
            --format='value(id)')
          echo "Cloud Build ID: $BUILD_ID"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status)')
            echo "Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "Image built successfully"; break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "Build failed: $STATUS"
                gcloud builds describe "$BUILD_ID" \
                  --project "${{ vars.GCP_PROJECT_ID }}" \
                  --format='table(steps.name,steps.status,steps.args)' 2>/dev/null || true
                exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Deploy Cloud Run Job
        run: |
          # Try to update first. If the job doesn't exist yet, create it.
          # This avoids the TOCTOU race of describe→create/update where two
          # concurrent deploys could both attempt create and one would fail.
          #
          # Non-secret curation config is set via --set-env-vars; secrets via
          # --set-secrets. To switch engine, add the matching key secret
          # (anthropic-api-key / groq-api-key) and update CURATE_ENGINE here.
          if ! gcloud run jobs update "$JOB_NAME" \
               --image "$IMAGE" \
               --region "$REGION" \
               --project "${{ vars.GCP_PROJECT_ID }}" \
               --set-secrets "DATABASE_URL=database-url:latest,GEMINI_API_KEY=gemini-api-key:latest" \
               --set-env-vars "CURATE_ENGINE=gemini,DISTILL_PATTERNS=extract_wisdom,DISTILL_BATCH_SIZE=100" \
               --max-retries 1 \
               --task-timeout 1800s \
               --memory 512Mi \
               --cpu 1 2>/dev/null; then
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" \
              --image "$IMAGE" \
              --region "$REGION" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --set-secrets "DATABASE_URL=database-url:latest,GEMINI_API_KEY=gemini-api-key:latest" \
              --set-env-vars "CURATE_ENGINE=gemini,DISTILL_PATTERNS=extract_wisdom,DISTILL_BATCH_SIZE=100" \
              --max-retries 1 \
              --task-timeout 1800s \
              --memory 512Mi \
              --cpu 1
          fi

      - name: Execute job once
        if: github.event_name == 'push' || github.event.inputs.run_after_deploy == 'true'
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait
