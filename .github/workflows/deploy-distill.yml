name: Deploy rara-distill

# GATED — manual only, and currently a no-op guard. Since P1c, rara-distill is a 2.0 bridge-total
# claim-worker: it only does work when the reconciler (VPC, a future phase) routes `destilar`
# item_steps to its provider. The previous push:main auto-deploy was removed because (a) the build
# was single-module while the app now imports rara-addon via `replace ../rara-addon`, and (b) it
# would replace the live 1.0 batch job with a worker that drains an empty queue, pausing live
# distillation. The actual build/deploy steps (single-module Docker, news lane, DISTILL_BATCH_SIZE)
# were removed here because they are obsolete and would be rewritten anyway — the pre-P1c version is
# in git history as a starting point. The Guard step below documents what the P2 rework needs.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gated:
    name: Deploy gated until the 2.0 reconciler exists
    runs-on: ubuntu-latest
    steps:
      - name: Guard — deploy is gated (P2)
        run: |
          echo "rara-distill deploy is GATED until the 2.0 reconciler/VPC phase (P2)."
          echo
          echo "Before re-enabling this workflow, the deploy needs:"
          echo "  1. MULTI-MODULE Docker build — pack rara-addon + rara-distill into the build"
          echo "     context (the app imports rara-addon via 'replace ../rara-addon')."
          echo "  2. Claim-worker job env — set DISTILL_PROVIDER (e.g. distill); the news lane,"
          echo "     DISTILL_SOURCE and DISTILL_BATCH_SIZE were removed in P1c."
          echo "  3. Restore the push:main trigger once the reconciler routes 'destilar' steps."
          echo
          echo "Reference: the pre-P1c build/deploy steps live in git history for this file."
          exit 1
