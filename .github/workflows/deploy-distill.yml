name: Deploy rara-distill

# GATED — manual dispatch only (NO push:main). Thin caller of the reusable multi-module deploy
# (_reusable-deploy-worker.yml). rara-distill is a 2.0 bridge-total claim-worker: it only does
# work once the reconciler (VPC, a future phase) routes `destilar` item_steps to its provider.
# Re-enabling auto-deploy (push:main) + the per-provider env config is the lane-activation wave
# (W1). App-specific secret to wire then: the LiteLLM model key for the distiller
# (e.g. LITELLM_API_KEY=litellm-api-key:latest) alongside DATABASE_URL.
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy-worker.yml
    with:
      app: rara-distill
      run_after_deploy: ${{ inputs.run_after_deploy }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
