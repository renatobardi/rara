name: Deploy rara-core

# Deploys rara-core as a systemd service on the Oracle VM (always-on reconciler + surface).
# Builds a native linux/arm64 binary (the replace ../rara-addon directive resolves because
# the full repo is checked out). Connects via SSH; no GCP credentials needed here — the
# activator reads GOOGLE_APPLICATION_CREDENTIALS from /etc/rara-core/env on the VM.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rara-core/**'
      - 'rara-addon/**'

jobs:
  deploy:
    name: Build & Deploy (ARM64, rsync+systemd)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: rara-core/go.mod

      - name: Build ARM64 binary
        # Full repo checkout satisfies the replace ../rara-addon sibling path.
        # CGO_ENABLED=0 allows cross-compile to linux/arm64 (Oracle VM arch).
        run: |
          cd rara-core
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-w -s" -o core-job .

      - name: Setup SSH
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload binary and service file
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p ${DEPLOY_PATH}/bin"
          rsync -az rara-core/core-job \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/bin/core-job"
          rsync -az rara-core/deploy/rara-core.service \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/rara-core.service"

      - name: Install service and restart
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" bash <<'EOF'
            set -euo pipefail
            sudo cp /tmp/rara-core.service /etc/systemd/system/rara-core.service
            sudo systemctl daemon-reload
            sudo systemctl enable rara-core
            if sudo systemctl is-active --quiet rara-core; then
              sudo systemctl restart rara-core
            else
              sudo systemctl start rara-core
            fi
            sleep 3
            sudo systemctl status rara-core --no-pager -l | head -20
          EOF
