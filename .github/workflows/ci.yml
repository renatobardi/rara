name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  code-quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version-file: rara-harvest/go.mod

      - name: Cache Go modules
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: |
          cd rara-harvest
          go mod download

      - name: Format check
        run: |
          cd rara-harvest
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "❌ Code formatting issues found. Run: gofmt -w ."
            gofmt -s -d .
            exit 1
          fi
          echo "✅ Code format OK"

      - name: Lint
        run: |
          cd rara-harvest
          go vet ./...
          echo "✅ Vet check passed"

      - name: Run tests
        run: |
          cd rara-harvest
          go test -v -race -coverprofile=coverage.out ./...
          echo "✅ Tests passed"

      - name: Check coverage
        run: |
          cd rara-harvest
          go tool cover -func=coverage.out | tail -1
          echo "✅ Coverage report generated"

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version-file: rara-harvest/go.mod

      - name: Vulnerability scan (govulncheck)
        run: |
          cd rara-harvest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: rara-harvest
          file: rara-harvest/Dockerfile
          push: false
          tags: rara-harvest:latest
          platforms: linux/amd64

      - name: Verify image
        run: |
          echo "✅ Docker image built successfully (amd64)"

  database:
    name: Database Validation
    runs-on: ubuntu-latest
    needs: [code-quality, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Build DATABASE_URL from secrets
        run: |
          echo "DATABASE_URL=postgresql://${{ secrets.NEON_USERNAME }}:${{ secrets.NEON_PASSWORD }}@${{ secrets.NEON_HOST }}:${{ secrets.NEON_PORT }}/${{ secrets.NEON_DATABASE }}" >> $GITHUB_ENV

      - name: Validate database connection
        run: |
          psql "$DATABASE_URL" -c "SELECT 1" > /dev/null 2>&1 && echo "✅ Database connection OK" || echo "❌ Database connection failed"

      - name: Validate schema files
        run: |
          cd rara-harvest
          echo "Validating migration files..."

          for file in migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "Checking: $(basename $file)"
              if grep -q "CREATE TABLE\|DROP TABLE\|CREATE INDEX" "$file"; then
                echo "✅ $(basename $file) syntax looks good"
              fi
            fi
          done

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [code-quality, security, docker, database]

    steps:
      - name: Check overall status
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "CI/CD Pipeline Summary"
          echo "════════════════════════════════════════════════════════"
          echo ""
          echo "✅ Code Quality & Tests: ${{ needs.code-quality.result }}"
          echo "✅ Security Scan: ${{ needs.security.result }}"
          echo "✅ Docker Build: ${{ needs.docker.result }}"
          echo "✅ Database Validation: ${{ needs.database.result }}"
          echo ""

      - name: Final status (success)
        if: success()
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "🎉 Pipeline passed! Ready to deploy."
          echo "════════════════════════════════════════════════════════"

      - name: Final status (failure)
        if: failure()
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "❌ Pipeline failed. Check logs above."
          echo "════════════════════════════════════════════════════════"
          exit 1
