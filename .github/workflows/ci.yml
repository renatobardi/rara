name: CI rara-harvest

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  code-quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: rara-harvest/go.mod

      - name: Cache Go modules
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: |
          cd rara-harvest
          go mod download

      - name: Format check
        run: |
          cd rara-harvest
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "❌ Code formatting issues found. Run: gofmt -w ."
            gofmt -s -d .
            exit 1
          fi
          echo "✅ Code format OK"

      - name: Lint
        run: |
          cd rara-harvest
          go vet ./...
          echo "✅ Vet check passed"

      - name: Run tests
        run: |
          cd rara-harvest
          go test -v -race -coverprofile=coverage.out ./...
          echo "✅ Tests passed"

      - name: Check coverage
        run: |
          cd rara-harvest
          go tool cover -func=coverage.out | tail -1
          echo "✅ Coverage report generated"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: rara-harvest/go.mod

      - name: Vulnerability scan (govulncheck)
        run: |
          cd rara-harvest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: rara-harvest
          file: rara-harvest/Dockerfile
          push: false
          tags: rara-harvest:latest
          platforms: linux/amd64

      - name: Verify image
        run: |
          echo "✅ Docker image built successfully (amd64)"

  database:
    name: Database Validation
    runs-on: ubuntu-latest
    needs: [code-quality, security]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Build DATABASE_URL from secrets
        run: |
          echo "DATABASE_URL=postgresql://${{ secrets.NEON_USERNAME }}:${{ secrets.NEON_PASSWORD }}@${{ secrets.NEON_HOST }}:${{ secrets.NEON_PORT }}/${{ secrets.NEON_DATABASE }}" >> $GITHUB_ENV

      - name: Validate database connection (non-blocking smoke check)
        run: |
          # Non-blocking on purpose: a brief Neon serverless cold-start must not look
          # like a CI failure, and the real DB gate is the migration workflow. Retry to
          # absorb cold starts; if still unreachable, surface a GitHub warning (the step
          # still passes) instead of a scary "❌" that reads like a broken build.
          ok=""
          for attempt in 1 2 3; do
            if psql "$DATABASE_URL" -c "SELECT 1" > /dev/null 2>&1; then
              ok=1; break
            fi
            echo "Attempt $attempt: database not reachable yet, retrying in 5s..."
            sleep 5
          done
          if [ -n "$ok" ]; then
            echo "✅ Database connection OK"
          else
            echo "::warning::Database unreachable after 3 attempts (non-blocking smoke check; the migration workflow is the real DB gate)"
          fi

      - name: Validate schema files
        run: |
          cd rara-harvest
          echo "Validating migration files..."

          for file in migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "Checking: $(basename $file)"
              if grep -q "CREATE TABLE\|DROP TABLE\|CREATE INDEX" "$file"; then
                echo "✅ $(basename $file) syntax looks good"
              fi
            fi
          done

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [code-quality, security, docker, database]
    permissions: {}

    steps:
      - name: Check overall status
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "CI/CD Pipeline Summary"
          echo "════════════════════════════════════════════════════════"
          echo ""
          echo "✅ Code Quality & Tests: ${{ needs.code-quality.result }}"
          echo "✅ Security Scan: ${{ needs.security.result }}"
          echo "✅ Docker Build: ${{ needs.docker.result }}"
          echo "✅ Database Validation: ${{ needs.database.result }}"
          echo ""

      - name: Final status (success)
        if: success()
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "🎉 Pipeline passed! Ready to deploy."
          echo "════════════════════════════════════════════════════════"

      - name: Final status (failure)
        if: failure()
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "❌ Pipeline failed. Check logs above."
          echo "════════════════════════════════════════════════════════"
          exit 1
