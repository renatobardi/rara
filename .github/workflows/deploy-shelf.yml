name: Deploy rara-shelf to Cloud Run

on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - main
    paths:
      - 'rara-shelf/**'
      - '.github/workflows/deploy-shelf.yml'

# Required for Workload Identity Federation (keyless auth to GCP).
permissions:
  contents: read
  id-token: write

env:
  REGION: ${{ vars.GCP_REGION }}
  JOB_NAME: rara-shelf
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-shelf:${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy Cloud Run Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Build image with Cloud Build
        run: |
          tar -czf /tmp/shelf-source.tgz -C rara-shelf .
          gcloud storage cp /tmp/shelf-source.tgz \
            "gs://oute-rara_cloudbuild/source/shelf-${GITHUB_SHA}.tgz"

          cat > /tmp/cloudbuild-shelf.yaml << YAML
          steps:
          - name: 'gcr.io/cloud-builders/docker'
            args: ['build', '-t', '${IMAGE}', '.']
          source:
            storageSource:
              bucket: oute-rara_cloudbuild
              object: source/shelf-${GITHUB_SHA}.tgz
          images: ['${IMAGE}']
          YAML

          BUILD_ID=$(gcloud builds submit \
            --no-source \
            --config=/tmp/cloudbuild-shelf.yaml \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --async \
            --format='value(id)')
          echo "Cloud Build ID: $BUILD_ID"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status)')
            echo "Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "Image built successfully"; break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "Build failed: $STATUS"
                exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Deploy Cloud Run Job
        run: |
          # Try to update first; if the job doesn't exist yet, create it.
          if ! gcloud run jobs update "$JOB_NAME" \
               --image "$IMAGE" \
               --region "$REGION" \
               --project "${{ vars.GCP_PROJECT_ID }}" \
               --set-secrets "DATABASE_URL=database-url:latest,GOOGLE_OAUTH_CLIENT_ID=shelf-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=shelf-oauth-client-secret:latest,GOOGLE_OAUTH_REFRESH_TOKEN=shelf-oauth-refresh-token:latest" \
               --max-retries 1 \
               --task-timeout 900s \
               --memory 512Mi \
               --cpu 1 2>/dev/null; then
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" \
              --image "$IMAGE" \
              --region "$REGION" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --set-secrets "DATABASE_URL=database-url:latest,GOOGLE_OAUTH_CLIENT_ID=shelf-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=shelf-oauth-client-secret:latest,GOOGLE_OAUTH_REFRESH_TOKEN=shelf-oauth-refresh-token:latest" \
              --max-retries 1 \
              --task-timeout 900s \
              --memory 512Mi \
              --cpu 1
          fi

      - name: Execute job once
        if: github.event_name == 'push' || github.event.inputs.run_after_deploy == 'true'
        run: |
          # --wait blocks until the execution completes, but gcloud itself has no
          # built-in timeout flag for jobs execute. Wrap with `timeout` (1000s > the
          # 900s task-timeout) so the runner never hangs indefinitely on a stuck job.
          timeout 1000 gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait
