name: Deploy rara-runner dispatch

# Deploys `rara-runner dispatch` as an always-on systemd service on the Oracle VM — the piece that
# re-arms on_demand workers (reads assigned steps from Neon, wakes the GCP Cloud Run jobs via
# jobs:run). Native linux/arm64 binary + rsync + systemd, no Docker on the VPC (mirrors deploy-core).
#
# workflow_dispatch ONLY: the first bring-up must be deliberate, after the VM has /etc/rara-runner/env
# (DATABASE_URL, CLOUD_RUN_PROJECT/REGION, GOOGLE_APPLICATION_CREDENTIALS). A push trigger can be
# added later. The install path /opt/rara-runner is fixed here (DEPLOY_PATH points at the core).
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy (ARM64, rsync+systemd)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: rara-runner/go.mod

      - name: Build ARM64 binary
        # CGO_ENABLED=0 allows cross-compile to linux/arm64 (Oracle VM arch).
        run: |
          cd rara-runner
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-w -s" -o rara-runner .

      - name: Setup SSH
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload binary and service file
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p /opt/rara-runner/bin"
          rsync -az rara-runner/rara-runner \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/rara-runner/bin/rara-runner"
          rsync -az rara-runner/deploy/rara-runner-dispatch.service \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/rara-runner-dispatch.service"

      - name: Install service and restart
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" bash <<'EOF'
            set -euo pipefail
            sudo mv /tmp/rara-runner-dispatch.service /etc/systemd/system/rara-runner-dispatch.service
            sudo systemctl daemon-reload
            sudo systemctl enable rara-runner-dispatch
            if sudo systemctl is-active --quiet rara-runner-dispatch; then
              sudo systemctl restart rara-runner-dispatch
            else
              sudo systemctl start rara-runner-dispatch
            fi
            sleep 3
            sudo systemctl status rara-runner-dispatch --no-pager -l | head -20
          EOF
