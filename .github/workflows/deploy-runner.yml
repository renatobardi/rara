name: Deploy rara-runner (dispatch + agent)

# Deploys both rara-runner subcommands as always-on systemd services on the Oracle VM:
#   - `dispatch`: re-arms on_demand workers (reads Neon, wakes Cloud Run jobs via jobs:run)
#   - `agent`:    resident HTTP daemon (POST /run → docker run) for VPC-local workers
# Native linux/arm64 binary + rsync + systemd, no Docker required for dispatch itself.
#
# workflow_dispatch ONLY: the first bring-up must be deliberate, after the VM has both
# /etc/rara-runner/env (dispatch) and /etc/rara-runner/agent.env (agent). A push trigger
# can be added later. The install path /opt/rara-runner is fixed here.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy (ARM64, rsync+systemd)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: rara-runner/go.mod

      - name: Build ARM64 binary
        # CGO_ENABLED=0 allows cross-compile to linux/arm64 (Oracle VM arch).
        run: |
          cd rara-runner
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-w -s" -o rara-runner .

      - name: Setup SSH
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload binary and service files
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          # staging is ubuntu-owned — avoids /tmp which is world-writable (TOCTOU risk).
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p /opt/rara-runner/bin /opt/rara-runner/staging"
          rsync -az rara-runner/rara-runner \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/rara-runner/bin/rara-runner"
          rsync -az rara-runner/deploy/rara-runner-dispatch.service \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/rara-runner/staging/rara-runner-dispatch.service"
          rsync -az rara-runner/deploy/rara-runner-agent.service \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/rara-runner/staging/rara-runner-agent.service"

      - name: Migrate agent.env to path-only allowlist format
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" bash <<'EOF'
            set -euo pipefail
            env_file=/etc/rara-runner/agent.env
            if [ -f "$env_file" ] && grep -qE '@sha256:[a-f0-9]{64}' "$env_file"; then
              sudo sed -i 's/@sha256:[a-f0-9]\{64\}//g' "$env_file"
              echo "Migrated $env_file: stripped digest pins from RUNNER_ALLOWED_IMAGES"
            else
              echo "No digest pins found in $env_file — nothing to migrate"
            fi
          EOF

      - name: Install services and restart
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" bash <<'EOF'
            set -euo pipefail

            # install sets root ownership and 0644 atomically — safer than mv from staging.
            sudo install -o root -g root -m 0644 \
              /opt/rara-runner/staging/rara-runner-dispatch.service \
              /etc/systemd/system/rara-runner-dispatch.service
            sudo install -o root -g root -m 0644 \
              /opt/rara-runner/staging/rara-runner-agent.service \
              /etc/systemd/system/rara-runner-agent.service

            sudo systemctl daemon-reload

            sudo systemctl enable rara-runner-dispatch
            if sudo systemctl is-active --quiet rara-runner-dispatch; then
              sudo systemctl restart rara-runner-dispatch
            else
              sudo systemctl start rara-runner-dispatch
            fi

            sudo systemctl enable rara-runner-agent
            if sudo systemctl is-active --quiet rara-runner-agent; then
              sudo systemctl restart rara-runner-agent
            else
              sudo systemctl start rara-runner-agent
            fi

            sleep 3
            sudo systemctl status rara-runner-dispatch --no-pager -l | head -20
            sudo systemctl status rara-runner-agent --no-pager -l | head -20
          EOF
