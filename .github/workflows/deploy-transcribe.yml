name: Deploy rara-transcribe (echo/echo-cloud, cloud)

# GATED — manual dispatch only (NO push:main). rara-transcribe is a 2.0 bridge-total claim-worker
# (`transcrever`): it only runs once the reconciler routes transcription steps to its provider.
# This deploy targets the echo worker (echo-cloud).
# Job name = rara-transcribe (new consolidated job; legacy GCP job remains until P2b-B).
# Downloads the enclosure over HTTP and transcribes via Groq — needs GROQ_API_KEY in addition to
# DATABASE_URL.
#
# MULTI-ARCH (mirrors deploy-distill.yml): builds ONE image with `docker buildx`
# (amd64 for Cloud Run + arm64 for VPC Oracle Ampere + Mac) and pushes a manifest list to
# Artifact Registry. Cloud Run pulls the amd64 leaf automatically. See DOCKER-MULTIMODULE.md.
#
# The caption worker (caption-mac) runs natively on the Mac (residential IP, launchd) and is NOT
# deployed here. The Mac binary rebuild is a manual step (P2b-transcribe-B).
permissions: {}

on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: false
        type: boolean

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-transcribe:${{ github.sha }}

jobs:
  build:
    name: Build multi-arch image (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      # buildx forwards the gcloud credential helper's token over the build session, so no separate
      # docker login action is needed.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      # QEMU only emulates the tiny final alpine stage; the Go compile cross-builds natively.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      # MULTI-MODULE context = repo root so `replace rara-addon => ../rara-addon` resolves; the
      # Dockerfile lives in the app dir and is selected with `file:`. See DOCKER-MULTIMODULE.md.
      - name: Build and push manifest list
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: rara-transcribe/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}

      # Acceptance check: the manifest list MUST carry exactly linux/amd64 + linux/arm64.
      # build-push-action v6 also emits attestation entries (platform: unknown/unknown); filter
      # those out before counting so the check stays exact without disabling provenance.
      - name: Verify manifest list has both arches
        run: |
          docker buildx imagetools inspect "$IMAGE"
          PLATFORMS=$(docker buildx imagetools inspect "$IMAGE" \
            --format '{{range .Manifest.Manifests}}{{if ne .Platform.OS "unknown"}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}{{end}}')
          echo "Platforms in manifest list: $PLATFORMS"
          echo "$PLATFORMS" | grep -qw "linux/amd64" || { echo "❌ missing linux/amd64"; exit 1; }
          echo "$PLATFORMS" | grep -qw "linux/arm64" || { echo "❌ missing linux/arm64"; exit 1; }
          COUNT=$(echo "$PLATFORMS" | wc -w)
          [ "$COUNT" -eq 2 ] || { echo "❌ expected exactly 2 real platforms, found $COUNT: $PLATFORMS"; exit 1; }
          echo "✅ manifest list has exactly linux/amd64 + linux/arm64"

  deploy:
    name: Deploy Cloud Run Job (rara-transcribe)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ vars.GCP_REGION }}
      JOB_NAME: rara-transcribe
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Deploy Cloud Run Job
        run: |
          # Update first, create if absent (avoids a describe→create/update TOCTOU race).
          # DATABASE_URL is the shared contract DB; GROQ_API_KEY is transcribe-specific (ASR engine).
          # SCRIBE_PROVIDER is intentionally a placeholder — the dispatcher always overrides it per execution.
          SECRETS="DATABASE_URL=database-url:latest,GROQ_API_KEY=groq-api-key:latest"
          ENV_VARS="SCRIBE_PROVIDER=PLACEHOLDER_PROVIDER,TRANSCRIBE_ENGINE=groq"
          COMMON_ARGS="--image $IMAGE --region $REGION --project $GCP_PROJECT --set-secrets $SECRETS --set-env-vars $ENV_VARS --max-retries 0 --task-timeout 3600s --memory 512Mi --cpu 1"

          UPDATE_ERR=$(gcloud run jobs update "$JOB_NAME" $COMMON_ARGS 2>&1) && echo "$UPDATE_ERR" || {
            echo "$UPDATE_ERR"
            echo "$UPDATE_ERR" | grep -qiE "not found|does not exist|could not be found|cannot be found" || \
              { echo "❌ update failed for unexpected reason (not 'not found')"; exit 1; }
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" $COMMON_ARGS
          }

      - name: Execute job once
        if: ${{ inputs.run_after_deploy }}
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "$GCP_PROJECT" \
            --wait
