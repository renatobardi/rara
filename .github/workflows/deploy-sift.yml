name: Deploy rara-sift

# GATED — manual dispatch only (NO push:main). Thin caller of the reusable multi-module deploy
# (_reusable-deploy-worker.yml). rara-sift is a 2.0 claim-worker (the curation cascade): it only
# runs once the reconciler (VPC, a future phase) routes `gate_*` item_steps to its provider.
# ONE image, TWO providers → TWO Cloud Run Jobs (rara-gate-barato + rara-gate-rico), one per matrix
# entry, each with its own SIFT_GATE/SIFT_PROVIDER. Job name = CLOUD_RUN_JOB_PREFIX(rara-) +
# provider (what the Activator wakes). Both wire LITELLM_* (rico's judge needs it; barato reads but
# never calls — uniform is simpler). Set vars.LITELLM_BASE_URL after A2 (deploy LiteLLM).
# ponytail: the multi-module image builds once per matrix entry (2× for the same rara-sift image) —
# minor wasted Cloud Build; not worth a build-once/deploy-twice split.
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    strategy:
      matrix:
        include:
          - { provider: gate-barato, gate: gate_barato }
          - { provider: gate-rico,   gate: gate_rico }
    uses: ./.github/workflows/_reusable-deploy-worker.yml
    with:
      app: rara-sift
      job_name: rara-${{ matrix.provider }}
      env_vars: SIFT_GATE=${{ matrix.gate }},SIFT_PROVIDER=${{ matrix.provider }},LITELLM_BASE_URL=${{ vars.LITELLM_BASE_URL }},LITELLM_MODEL=${{ vars.LITELLM_MODEL }}
      extra_secrets: LITELLM_API_KEY=litellm-api-key:latest
      run_after_deploy: ${{ inputs.run_after_deploy }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
