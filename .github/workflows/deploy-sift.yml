name: Deploy rara-sift

# GATED — manual dispatch only (NO push:main). rara-sift is a 2.0 claim-worker (the curation
# cascade): it only runs once the reconciler (VPC, a future phase) routes `gate_*` item_steps to
# its provider.
#
# This is the MULTI-ARCH proof-of-concept (F2 of ATIVACAO-UNIFICADA.pt-BR.md): unlike the other
# SDK workers — which still build single-arch via _reusable-deploy-worker.yml + Cloud Build — sift
# builds ONE multi-arch image with `docker buildx` (amd64 for Cloud Run + arm64 for VPC/Mac, both
# Ampere/Apple-Silicon) and pushes a manifest list to Artifact Registry. Cloud Run pulls the amd64
# leaf automatically. This file is the replicable pattern the other apps copy later (do NOT yet
# touch the shared reusable workflow — that would migrate everyone at once). See DOCKER-MULTIMODULE.md.
#
# ONE image, TWO providers → TWO Cloud Run Jobs (rara-gate-barato + rara-gate-rico), each with its
# own SIFT_GATE/SIFT_PROVIDER. The image is built once (the `build` job) and deployed twice (the
# `deploy` matrix) — an improvement over the old build-per-matrix-entry. Job name =
# CLOUD_RUN_JOB_PREFIX(rara-) + provider (what the Activator wakes). Both wire LITELLM_* (rico's
# judge needs it; barato reads but never calls — uniform is simpler).
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the jobs once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-sift:${{ github.sha }}

jobs:
  build:
    name: Build multi-arch image (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      # buildx forwards the gcloud credential helper's token over the build session, so no separate
      # docker login action is needed.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      # QEMU only emulates the tiny final alpine stage; the Go compile cross-builds natively.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      # MULTI-MODULE context = repo root so `replace rara-addon => ../rara-addon` resolves; the
      # Dockerfile lives in the app dir and is selected with `file:`. See DOCKER-MULTIMODULE.md.
      - name: Build and push manifest list
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: rara-sift/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}

      - name: Verify manifest list has both arches
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE }}"
          ARCHES=$(docker buildx imagetools inspect "${{ env.IMAGE }}" --format '{{range .Manifest.Manifests}}{{.Platform.Architecture}} {{end}}')
          echo "Arches in manifest list: $ARCHES"
          echo "$ARCHES" | grep -qw amd64 || { echo "❌ missing amd64"; exit 1; }
          echo "$ARCHES" | grep -qw arm64 || { echo "❌ missing arm64"; exit 1; }
          echo "✅ manifest list has amd64 + arm64"

  deploy:
    name: Deploy Cloud Run Job
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { provider: gate-barato, gate: gate_barato }
          - { provider: gate-rico,   gate: gate_rico }
    env:
      REGION: ${{ vars.GCP_REGION }}
      JOB_NAME: rara-${{ matrix.provider }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Deploy Cloud Run Job
        run: |
          # Update first, create if absent (avoids a describe→create/update TOCTOU race).
          # DATABASE_URL is the shared contract DB; LITELLM_API_KEY is sift-specific.
          # NOTE: groq-fast hardcoded (llama-3.1-8b-instant) — gates are a simple JSON judge and
          # don't need the 70b; keeping them on groq-fast avoids quota contention with distill
          # (groq-llama/70b). vars.LITELLM_MODEL=gemini-flash is spend-capped → ignored.
          SECRETS="DATABASE_URL=database-url:latest,LITELLM_API_KEY=litellm-api-key:latest"
          ENV_VARS="SIFT_GATE=${{ matrix.gate }},SIFT_PROVIDER=${{ matrix.provider }},LITELLM_BASE_URL=${{ vars.LITELLM_BASE_URL }},LITELLM_MODEL=groq-fast"

          UPDATE_ERR=$(gcloud run jobs update "$JOB_NAME" \
               --image "$IMAGE" \
               --region "$REGION" \
               --project "${{ vars.GCP_PROJECT_ID }}" \
               --set-secrets "$SECRETS" \
               --set-env-vars "$ENV_VARS" \
               --max-retries 0 \
               --task-timeout 3600s \
               --memory 512Mi \
               --cpu 1 2>&1) && echo "$UPDATE_ERR" || {
            # Surface the error; only proceed to create if the job genuinely doesn't exist yet.
            echo "$UPDATE_ERR"
            echo "$UPDATE_ERR" | grep -qi "not found\|does not exist\|cannot be found" || \
              { echo "❌ update failed for unexpected reason (not 'not found')"; exit 1; }
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" \
              --image "$IMAGE" \
              --region "$REGION" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --set-secrets "$SECRETS" \
              --set-env-vars "$ENV_VARS" \
              --max-retries 0 \
              --task-timeout 3600s \
              --memory 512Mi \
              --cpu 1
          }

      - name: Execute job once
        if: ${{ inputs.run_after_deploy }}
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait
