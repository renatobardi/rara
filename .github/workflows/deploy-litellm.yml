name: Deploy LiteLLM gateway

# Triggered on push to main when litellm config/image changes, or manually.
# Builds a custom image with config.yaml baked in and deploys to the existing
# Cloud Run Service "litellm". API keys come from Secret Manager — no manual
# secret mount of litellm-config needed.
on:
  push:
    branches: [main]
    paths:
      - 'rara-distill/litellm/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy LiteLLM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ vars.GCP_REGION }}
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/litellm:${{ github.sha }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: |
          test -n "$REGION" || { echo "GCP_REGION not set"; exit 1; }
          test -n "$PROJECT" || { echo "GCP_PROJECT_ID not set"; exit 1; }
          gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          test -n "$IMAGE" || { echo "IMAGE not set"; exit 1; }
          docker build --pull -t "$IMAGE" rara-distill/litellm
          docker push "$IMAGE"

      - name: Deploy to Cloud Run Service
        run: |
          gcloud run deploy litellm \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT" \
            --port 8080 \
            --args="--config,/app/config.yaml,--port,8080" \
            --set-secrets="GEMINI_API_KEY=gemini-api-key:latest,GROQ_API_KEY=groq-api-key:latest,LITELLM_MASTER_KEY=litellm-api-key:latest,DEEPSEEK_API_KEY=deepseek-api-key:latest,DATABASE_URL=litellm-database-url:latest,LITELLM_SALT_KEY=litellm-salt-key:latest"
