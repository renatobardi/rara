name: Reusable — Deploy Cloud Run Worker (multi-module)

# Reusable workflow (workflow_call only) — the single source of the multi-module build+deploy
# for the SDK-coupled workers (distill/sift/glean/scribe). Packs the sibling rara-addon SDK +
# the app into the Cloud Build context so `replace ../rara-addon` resolves; see
# DOCKER-MULTIMODULE.md. Callers (deploy-<app>.yml) are workflow_dispatch-only and gated —
# there is NO push:main trigger anywhere.
#
# Secrets: every worker gets the shared DATABASE_URL. App-specific secrets (LiteLLM key,
# brightdata/gmail, ASR engine key) are NOT wired here — they are added at lane activation
# (W1); each caller documents which one its app needs.
on:
  workflow_call:
    inputs:
      app:
        description: 'App dir = job name = image name, e.g. rara-distill'
        required: true
        type: string
      run_after_deploy:
        description: 'Execute the job once right after deploying'
        required: false
        default: false
        type: boolean
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true

# Required for Workload Identity Federation (keyless auth to GCP). The caller must also grant
# id-token: write — a reusable workflow cannot exceed the caller token's permissions.
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy Cloud Run Job
    runs-on: ubuntu-latest
    env:
      REGION: ${{ vars.GCP_REGION }}
      JOB_NAME: ${{ inputs.app }}
      APP_DIR: ${{ inputs.app }}
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/${{ inputs.app }}:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Build image with Cloud Build (multi-module)
        run: |
          # MULTI-MODULE context: pack the sibling SDK + this app (NOT just the app dir), so the
          # `replace rara-addon => ../rara-addon` resolves inside the build. The Dockerfile lives
          # in the app dir and is referenced with -f. See DOCKER-MULTIMODULE.md.
          tar -czf /tmp/source.tgz rara-addon "${APP_DIR}"
          gcloud storage cp /tmp/source.tgz \
            "gs://${{ vars.GCP_PROJECT_ID }}_cloudbuild/source/${JOB_NAME}-${GITHUB_SHA}.tgz"

          cat > /tmp/cloudbuild.yaml << YAML
          steps:
          - name: 'gcr.io/cloud-builders/docker'
            args: ['build', '-t', '${IMAGE}', '-f', '${APP_DIR}/Dockerfile', '.']
          source:
            storageSource:
              bucket: ${{ vars.GCP_PROJECT_ID }}_cloudbuild
              object: source/${JOB_NAME}-${GITHUB_SHA}.tgz
          images: ['${IMAGE}']
          YAML

          # --async avoids log streaming (SA lacks log viewer); we poll status instead.
          BUILD_ID=$(gcloud builds submit \
            --no-source \
            --config=/tmp/cloudbuild.yaml \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --async \
            --format='value(id)')
          echo "Cloud Build ID: $BUILD_ID"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status)')
            echo "Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "Image built successfully"; break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "Build failed: $STATUS"
                gcloud builds describe "$BUILD_ID" \
                  --project "${{ vars.GCP_PROJECT_ID }}" \
                  --format='table(steps.name,steps.status,steps.args)' 2>/dev/null || true
                exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Deploy Cloud Run Job
        run: |
          # Update first, create if absent (avoids a describe→create/update TOCTOU race).
          # DATABASE_URL is the shared contract DB; app-specific secrets are wired at lane
          # activation (W1) — see the caller's header for which one this app needs.
          if ! gcloud run jobs update "$JOB_NAME" \
               --image "$IMAGE" \
               --region "$REGION" \
               --project "${{ vars.GCP_PROJECT_ID }}" \
               --set-secrets "DATABASE_URL=database-url:latest" \
               --max-retries 0 \
               --task-timeout 3600s \
               --memory 512Mi \
               --cpu 1 2>/dev/null; then
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" \
              --image "$IMAGE" \
              --region "$REGION" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --set-secrets "DATABASE_URL=database-url:latest" \
              --max-retries 0 \
              --task-timeout 3600s \
              --memory 512Mi \
              --cpu 1
          fi

      - name: Execute job once
        if: ${{ inputs.run_after_deploy }}
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait
