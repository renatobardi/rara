name: Deploy rara-scribe (asr-direct, cloud)

# GATED — manual dispatch only (NO push:main). This deploys the CLOUD provider of rara-scribe:
# SCRIBE_PROVIDER=asr-direct (fetch enclosure over HTTP + transcribe via an API engine). The
# asr-youtube provider runs natively on the Mac (residential IP, launchd) and is NOT deployed here.
# rara-scribe is a 2.0 claim-worker (`transcrever`): it only runs once the reconciler (VPC, a future
# phase) routes transcription steps to this provider. Re-enabling auto-deploy (push:main) and the
# per-provider env config belongs to the lane-activation wave (W1), not this build/packaging slice.
# Built via the MULTI-MODULE context (rara-addon + rara-scribe); see DOCKER-MULTIMODULE.md.
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Required for Workload Identity Federation (keyless auth to GCP).
permissions:
  contents: read
  id-token: write

env:
  REGION: ${{ vars.GCP_REGION }}
  JOB_NAME: rara-scribe
  APP_DIR: rara-scribe
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-scribe:${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy Cloud Run Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Build image with Cloud Build (multi-module)
        run: |
          # MULTI-MODULE context: pack the sibling SDK + this app (NOT just the app dir), so the
          # `replace rara-addon => ../rara-addon` resolves inside the build. The Dockerfile lives
          # in the app dir and is referenced with -f. See DOCKER-MULTIMODULE.md.
          tar -czf /tmp/source.tgz rara-addon "${APP_DIR}"
          gcloud storage cp /tmp/source.tgz \
            "gs://${{ vars.GCP_PROJECT_ID }}_cloudbuild/source/${JOB_NAME}-${GITHUB_SHA}.tgz"

          cat > /tmp/cloudbuild.yaml << YAML
          steps:
          - name: 'gcr.io/cloud-builders/docker'
            args: ['build', '-t', '${IMAGE}', '-f', '${APP_DIR}/Dockerfile', '.']
          source:
            storageSource:
              bucket: ${{ vars.GCP_PROJECT_ID }}_cloudbuild
              object: source/${JOB_NAME}-${GITHUB_SHA}.tgz
          images: ['${IMAGE}']
          YAML

          BUILD_ID=$(gcloud builds submit \
            --no-source \
            --config=/tmp/cloudbuild.yaml \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --async \
            --format='value(id)')
          echo "Cloud Build ID: $BUILD_ID"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status)')
            echo "Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "Image built successfully"; break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "Build failed: $STATUS"
                exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Deploy Cloud Run Job
        run: |
          # Update first, create if absent (avoids a describe→create/update TOCTOU race).
          # Secrets: DATABASE_URL is the shared contract DB. The ASR engine API key is
          # app-specific (Groq/Gemini, depending on TRANSCRIBE_ENGINE) — add it here when the
          # lane is lit, e.g.:
          #   --set-secrets "DATABASE_URL=database-url:latest,GROQ_API_KEY=groq-api-key:latest"
          # Provider env (SCRIBE_PROVIDER=asr-direct, TRANSCRIBE_ENGINE, …) is set at lane activation (W1).
          if ! gcloud run jobs update "$JOB_NAME" \
               --image "$IMAGE" \
               --region "$REGION" \
               --project "${{ vars.GCP_PROJECT_ID }}" \
               --set-secrets "DATABASE_URL=database-url:latest" \
               --max-retries 0 \
               --task-timeout 3600s \
               --memory 512Mi \
               --cpu 1 2>/dev/null; then
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" \
              --image "$IMAGE" \
              --region "$REGION" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --set-secrets "DATABASE_URL=database-url:latest" \
              --max-retries 0 \
              --task-timeout 3600s \
              --memory 512Mi \
              --cpu 1
          fi

      - name: Execute job once
        if: github.event.inputs.run_after_deploy == 'true'
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait
