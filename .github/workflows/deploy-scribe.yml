name: Deploy rara-scribe (asr-direct, cloud)

# GATED — manual dispatch only (NO push:main). Thin caller of the reusable multi-module deploy
# (_reusable-deploy-worker.yml). This deploys the CLOUD provider of rara-scribe:
# SCRIBE_PROVIDER=asr-direct (fetch enclosure over HTTP + transcribe via an API engine). The
# asr-youtube provider runs natively on the Mac (residential IP, launchd) and is NOT deployed
# here. rara-scribe is a 2.0 claim-worker (`transcrever`): it only runs once the reconciler (VPC,
# a future phase) routes transcription steps to this provider. Job name = CLOUD_RUN_JOB_PREFIX
# (rara-) + provider(asr-direct-audio) = rara-asr-direct-audio (what the Activator wakes). It
# downloads the enclosure over HTTP then transcribes via Groq, so it needs the groq-api-key secret
# (NOT just DATABASE_URL).
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy-worker.yml
    with:
      app: rara-scribe
      job_name: rara-asr-direct-audio
      env_vars: SCRIBE_PROVIDER=asr-direct-audio,TRANSCRIBE_ENGINE=groq
      extra_secrets: GROQ_API_KEY=groq-api-key:latest
      run_after_deploy: ${{ inputs.run_after_deploy }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
