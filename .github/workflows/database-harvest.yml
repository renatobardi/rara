name: Database rara-harvest

on:
  push:
    branches:
      - main
    paths:
      - 'rara-harvest/migrations/**'
      - 'rara-harvest/cleanup.sql'
      - '.github/workflows/database-harvest.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'rara-harvest/migrations/**'
      - 'rara-harvest/cleanup.sql'
      - '.github/workflows/database-harvest.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - migrate

jobs:
  validate:
    name: Validate Schema
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Configure database credentials
        env:
          PGHOST: ${{ secrets.NEON_HOST }}
          PGPORT: ${{ secrets.NEON_PORT }}
          PGUSER: ${{ secrets.NEON_USERNAME }}
          PGPASSWORD: ${{ secrets.NEON_PASSWORD }}
          PGDATABASE: ${{ secrets.NEON_DATABASE }}
        run: |
          {
            echo "PGHOST=${PGHOST}"
            echo "PGPORT=${PGPORT}"
            echo "PGUSER=${PGUSER}"
            echo "PGPASSWORD=${PGPASSWORD}"
            echo "PGDATABASE=${PGDATABASE}"
          } >> "$GITHUB_ENV"

      - name: Test database connection
        run: |
          echo "Testing connection to Neon..."
          psql -c "SELECT version();" || exit 1
          echo "✅ Database connection successful"

      - name: Check migration files
        run: |
          if [ ! -d "rara-harvest/migrations" ]; then
            echo "❌ migrations directory not found"
            exit 1
          fi
          MIGRATION_COUNT=$(ls -1 rara-harvest/migrations/*.sql 2>/dev/null | wc -l)
          echo "Found $MIGRATION_COUNT migration files"
          if [ "$MIGRATION_COUNT" -eq 0 ]; then
            echo "❌ No migration files found"
            exit 1
          fi

      - name: Validate SQL syntax
        run: |
          # Execute each migration inside a transaction and roll it back, so the
          # SQL is genuinely parsed/planned by Postgres without persisting changes.
          for file in $(ls rara-harvest/migrations/*.sql | sort -V); do
            echo "Validating: $(basename "$file")"
            { echo "BEGIN;"; cat "$file"; echo "ROLLBACK;"; } \
              | psql -v ON_ERROR_STOP=1 -q \
              && echo "✅ $(basename "$file") is valid" \
              || { echo "❌ $(basename "$file") failed validation"; exit 1; }
          done

  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    concurrency:
      group: database-harvest-migrate
      cancel-in-progress: false
    # Auto-apply on merge to main, or on a manual "migrate" dispatch.
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'migrate')
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Configure database credentials
        env:
          PGHOST: ${{ secrets.NEON_HOST }}
          PGPORT: ${{ secrets.NEON_PORT }}
          PGUSER: ${{ secrets.NEON_USERNAME }}
          PGPASSWORD: ${{ secrets.NEON_PASSWORD }}
          PGDATABASE: ${{ secrets.NEON_DATABASE }}
        run: |
          {
            echo "PGHOST=${PGHOST}"
            echo "PGPORT=${PGPORT}"
            echo "PGUSER=${PGUSER}"
            echo "PGPASSWORD=${PGPASSWORD}"
            echo "PGDATABASE=${PGDATABASE}"
          } >> "$GITHUB_ENV"

      - name: Apply migrations
        run: |
          echo "Applying migrations..."
          (
            echo "BEGIN;"
            for migration in $(ls rara-harvest/migrations/*.sql | sort -V); do
              echo "-- $(basename "$migration")"
              cat "$migration"
            done
            echo "COMMIT;"
          ) | psql -v ON_ERROR_STOP=1
          echo "✅ All migrations applied"

      - name: Verify schema
        run: |
          echo "Verifying schema..."
          TARGET_CHANNELS=$(psql -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'target_channels'")
          CHANNEL_VIDEOS=$(psql -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'channel_videos'")
          if [ "$TARGET_CHANNELS" -eq 1 ] && [ "$CHANNEL_VIDEOS" -eq 1 ]; then
            echo "✅ Schema verified successfully"
          else
            echo "❌ Schema verification failed"
            exit 1
          fi

      - name: Check indexes
        run: |
          echo "Verifying indexes..."
          psql -c "\di public.*" | head -20
