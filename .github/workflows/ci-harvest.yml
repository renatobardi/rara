name: CI rara-harvest

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'rara-harvest/**'
      - '.github/workflows/ci-harvest.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'rara-harvest/**'
      - '.github/workflows/ci-harvest.yml'

jobs:
  code-quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rara-harvest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: rara-harvest/go.mod

      - name: Cache Go modules
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-harvest-${{ hashFiles('rara-harvest/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-harvest-

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "❌ Code formatting issues found. Run: gofmt -w ."
            gofmt -s -d .
            exit 1
          fi
          echo "✅ Code format OK"

      - name: Lint
        run: |
          go vet ./...
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
          echo "✅ Vet + staticcheck passed"

      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          echo "✅ Tests passed"

      - name: Check coverage
        run: |
          go tool cover -func=coverage.out | tail -1
          echo "✅ Coverage report generated"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: rara-harvest/go.mod

      - name: Vulnerability scan (govulncheck)
        run: |
          cd rara-harvest
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
