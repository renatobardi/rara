name: Deploy rara-glean

# GATED — manual dispatch only (NO push:main). Thin caller of the reusable multi-module deploy
# (_reusable-deploy-worker.yml). rara-glean is a 2.0 claim-worker (collector): it only runs once
# the reconciler (VPC, a future phase) routes its capability to its provider. Re-enabling
# auto-deploy (push:main) + the per-provider env config (SCRAPE_PROVIDER) is the lane-activation
# wave (W1). App-specific secrets to wire then: the extractor credentials (gmail and/or
# brightdata, e.g. BRIGHTDATA_API_KEY=brightdata-api-key:latest) alongside DATABASE_URL.
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy-worker.yml
    with:
      app: rara-glean
      run_after_deploy: ${{ inputs.run_after_deploy }}
    secrets: inherit
