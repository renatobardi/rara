name: Deploy rara-glean

# GATED — manual dispatch only (NO push:main). Thin caller of the reusable multi-module deploy
# (_reusable-deploy-worker.yml). rara-glean is a 2.0 claim-worker (the already-text extractor): it
# only runs once the reconciler routes an `extrair` item_step to its provider.
#
# ONE image, N providers → N Cloud Run Jobs, one per matrix entry, each with its own GLEAN_PROVIDER.
# Job name = CLOUD_RUN_JOB_PREFIX(rara-) + provider (what the Activator wakes). Extraction is
# deterministic (HTML/boilerplate cleaning, no LLM), so each job wires only the shared DATABASE_URL —
# no model key, no extractor credentials (the feed/courier collectors already captured the body).
# ponytail: the multi-module image builds once per matrix entry (3× for the same rara-glean image) —
# minor wasted Cloud Build; not worth a build-once/deploy-thrice split.
on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying (off by default — the worker needs its provider env set first)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    strategy:
      matrix:
        provider: [extrair-email, extrair-linkedin, extrair-news]
    uses: ./.github/workflows/_reusable-deploy-worker.yml
    with:
      app: rara-glean
      job_name: rara-${{ matrix.provider }}
      env_vars: GLEAN_PROVIDER=${{ matrix.provider }}
      run_after_deploy: ${{ inputs.run_after_deploy }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
