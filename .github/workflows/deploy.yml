name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      run_after_deploy:
        description: 'Execute the job once right after deploying'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - main
    paths:
      - 'rara-harvest/**'
      - '.github/workflows/deploy.yml'

# Required for Workload Identity Federation (keyless auth to GCP).
permissions:
  contents: read
  id-token: write

env:
  REGION: ${{ vars.GCP_REGION }}
  JOB_NAME: rara-harvest
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rara/rara-harvest:${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy Cloud Run Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # WIF external_account credentials are not fully compatible with all
          # gcloud operations (e.g. Cloud Build source upload to GCS). Requesting
          # an access_token exchanges the WIF token for a standard OAuth2 token
          # that works with every gcloud command and client library.
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Build image with Cloud Build
        run: |
          # gcloud builds submit's internal GCS upload fails with external_account
          # (WIF) credentials. Workaround: upload source ourselves via gcloud storage
          # (which uses the same creds and works), then submit with --no-source
          # referencing the pre-uploaded tarball from a cloudbuild.yaml config.
          tar -czf /tmp/source.tgz -C rara-harvest .
          gcloud storage cp /tmp/source.tgz \
            "gs://oute-rara_cloudbuild/source/${GITHUB_SHA}.tgz"

          gcloud builds submit \
            --no-source \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --config=- << EOF
          steps:
          - name: 'gcr.io/cloud-builders/docker'
            args: ['build', '-t', '$IMAGE', '.']
          source:
            storageSource:
              bucket: oute-rara_cloudbuild
              object: source/${GITHUB_SHA}.tgz
          images: ['$IMAGE']
          EOF

      - name: Deploy Cloud Run Job
        run: |
          # Try to update first. If the job doesn't exist yet, create it.
          # This avoids the TOCTOU race of describe→create/update where two
          # concurrent deploys could both attempt create and one would fail.
          if ! gcloud run jobs update "$JOB_NAME" \
               --image "$IMAGE" \
               --region "$REGION" \
               --project "${{ vars.GCP_PROJECT_ID }}" \
               --set-secrets "YOUTUBE_API_KEY=youtube-api-key:latest,DATABASE_URL=database-url:latest" \
               --max-retries 1 \
               --task-timeout 600s \
               --memory 512Mi \
               --cpu 1 2>/dev/null; then
            echo "Job not found — creating for the first time..."
            gcloud run jobs create "$JOB_NAME" \
              --image "$IMAGE" \
              --region "$REGION" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --set-secrets "YOUTUBE_API_KEY=youtube-api-key:latest,DATABASE_URL=database-url:latest" \
              --max-retries 1 \
              --task-timeout 600s \
              --memory 512Mi \
              --cpu 1
          fi

      - name: Execute job once
        if: github.event_name == 'push' || github.event.inputs.run_after_deploy == 'true'
        run: |
          gcloud run jobs execute "$JOB_NAME" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --wait
